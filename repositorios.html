<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorios - Mi Portafolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .repos-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .repos-header h2 {
            font-size: 2.5em;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .repos-list {
            list-style-type: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .repos-list li {
            padding: 25px;
            border-radius: 16px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .repos-list li:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        body.light-mode .repos-list li:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .repos-list a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2em;
            transition: color 0.3s ease;
        }

        .repos-list a:hover {
            color: var(--accent-hover);
        }

        .repos-desc {
            font-size: 0.95em;
            opacity: 0.8;
            flex: 1;
        }

        .repo-stats {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            opacity: 0.7;
            margin-top: 10px;
        }

        .repo-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>

    <header>
        <nav class="glass">
            <h1>Mi Portafolio</h1>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="acerca-de.html">Acerca de</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="repositorios.html" style="color: var(--accent-color);">Repositorios</a></li>
                <li><a href="blog.html">Mi Blog</a></li>
            </ul>
            
            <div class="theme-toggle-container">
                <label class="toggle-switch" aria-label="Cambiar tema">
                    <input type="checkbox" id="theme-switch">
                    <span class="slider"></span>
                </label>
            </div>
        </nav>
    </header>

    <main>
        <div class="repos-header">
            <h2>Mis Repositorios</h2>
            <p>Todos mis proyectos públicos alojados en GitHub.</p>
        </div>

        <ul class="repos-list" id="all-repos-list">
            <li class="glass">
                <strong style="color: var(--accent-color);">Cargando repositorios...</strong>
                <p class="repos-desc">Espera un momento.</p>
            </li>
        </ul>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Rodrigo47363. Construido con pasión y código.</p>
    </footer>

    <script>
        function toggleDarkMode(e) {
            if (e.target.checked) {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const checkbox = document.getElementById('theme-switch');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                if (checkbox) checkbox.checked = true;
            } else {
                document.body.classList.remove('light-mode');
                if (checkbox) checkbox.checked = false;
            }
        }

        async function loadAllRepos() {
            const reposList = document.getElementById('all-repos-list');
            try {
                // Fetching up to 100 repositories
                const response = await fetch('https://api.github.com/users/rodrigo47363/repos?sort=updated&per_page=100');
                if (!response.ok) throw new Error(`Error: ${response.statusText}`);

                const repos = await response.json();
                reposList.innerHTML = '';
                
                repos.forEach(repo => {
                    const listItem = document.createElement('li');
                    listItem.className = 'glass';
                    
                    // Icons using text for simplicity without external libraries
                    const starIcon = '★';
                    const forkIcon = '⑂';

                    listItem.innerHTML = `
                        <a href="${repo.html_url}" target="_blank">${repo.name}</a>
                        <p class="repos-desc">${repo.description || 'Sin descripción'}</p>
                        <div class="repo-stats">
                            <span>${starIcon} ${repo.stargazers_count}</span>
                            <span>${forkIcon} ${repo.forks_count}</span>
                            <span>${repo.language || 'N/A'}</span>
                        </div>
                    `;
                    reposList.appendChild(listItem);
                });
            } catch (error) {
                console.error('Error cargando repositorios:', error.message);
                reposList.innerHTML = '<li class="glass"><strong style="color: #ef4444;">Error</strong><p class="repos-desc">No se pudieron cargar los repositorios.</p></li>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme(); 
            const themeSwitch = document.getElementById('theme-switch');
            if (themeSwitch) {
                themeSwitch.addEventListener('change', toggleDarkMode);
            }
            loadAllRepos();
        });
    </script>
</body>
</html>
